name: CI

on:
  push:
    branches: ['main']
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Expo doctor
        run: npx expo-doctor
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npx jest --runInBand --colors --verbose

  eas-preview-build:
    name: EAS Preview Build (Android)
    runs-on: ubuntu-latest
    needs: build-and-lint
#    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Run EAS preview build (Android)
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          SCHEME: "fay"
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        run: |
          echo "Starting EAS build - profile: preview (android)"
          eas build -p android --profile preview --non-interactive